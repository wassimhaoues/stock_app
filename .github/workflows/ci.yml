name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

# Phase 22.1:
# Sur main, ce workflow fait partie des validations obligatoires que le CD
# attend explicitement avant toute publication ou toute modification GitOps.
#
# Phase 22.2:
# Sur les PR vers main, ce workflow reste un required check avant merge ou
# auto-merge, aux cotes de Security et du workflow PR Validation.
#
# Phase 22.4:
# Les PR GitOps creees par la GitHub App ne doivent pas relancer les jobs
# applicatifs lourds. On les detecte par leur forme (bot + branche + titre).
#
# Phase 22.5:
# Pour les PR contributeurs, ce workflow reste un required check du ruleset
# GitHub. L'auto-merge ne doit jamais permettre de le contourner.

jobs:
  backend:
    name: Backend — test & build
    runs-on: ubuntu-latest
    env:
      IS_GITOPS_BOT_PR: >-
        ${{ github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot' && startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') && startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-') }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: GitOps bot PR detected
        if: env.IS_GITOPS_BOT_PR == 'true'
        run: |
          echo "GitOps bot PR detected."
          echo "Backend source not changed. Heavy backend CI skipped intentionally."

      - name: Checkout
        if: env.IS_GITOPS_BOT_PR != 'true'
        uses: actions/checkout@v4

      - name: Setup Java 17
        if: env.IS_GITOPS_BOT_PR != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests, build and enforce coverage
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: ./mvnw --batch-mode verify

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    env:
      IS_GITOPS_BOT_PR: >-
        ${{ github.event_name == 'pull_request' && github.event.pull_request.user.type == 'Bot' && startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') && startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-') }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: GitOps bot PR detected
        if: env.IS_GITOPS_BOT_PR == 'true'
        run: |
          echo "GitOps bot PR detected."
          echo "Frontend source not changed. Heavy frontend CI skipped intentionally."

      - name: Checkout
        if: env.IS_GITOPS_BOT_PR != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: env.IS_GITOPS_BOT_PR != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: npm ci

      - name: Check format
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: npm run format:check

      - name: Run tests and enforce coverage
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: npm run test:coverage
        env:
          CI: true

      - name: Audit production dependencies
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        if: env.IS_GITOPS_BOT_PR != 'true'
        run: npm run build

  sonarcloud:
    name: SonarCloud — quality gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    # Free plan: analysis is available on main branch and PRs targeting main only
    if: >-
      github.ref == 'refs/heads/main' ||
      (
        github.event_name != 'pull_request' &&
        github.base_ref == 'main' &&
        (
          github.event.pull_request.user.type != 'Bot' ||
          !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
          !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')
        )
      )

    steps:
      - name: Checkout (full history for blame data)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend coverage report
        working-directory: frontend
        run: npm run test:coverage
        env:
          CI: true

      - name: Build backend and generate coverage report
        working-directory: backend
        run: ./mvnw --batch-mode verify dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Verify Sonar coverage inputs exist
        run: |
          test -f backend/target/site/jacoco/jacoco.xml
          test -f frontend/coverage/stockpro-frontend/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
