name: GitOps Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: gitops-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

# Phase 22.4:
# Les PR GitOps creees par la GitHub App ne doivent lancer que des checks
# legers, sans rebuild applicatif ni scans de securite lourds.

jobs:
  gitops-light-checks:
    name: GitOps light checks
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.type == 'Bot' &&
      startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') &&
      startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow helper scripts
        run: |
          if compgen -G ".github/scripts/*.sh" > /dev/null; then
            bash -n .github/scripts/*.sh
          fi
          python3 -m py_compile .github/scripts/*.py

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION="v5.4.3"
          curl -sLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"

      - name: Validate YAML syntax
        run: |
          yamllint -c .github/yamllint.yml \
            .github/workflows \
            k8s \
            infra \
            docker-compose.yml

      - name: Validate kustomize build
        run: kustomize build k8s/overlays/gitops > /tmp/gitops-rendered.yaml

      - name: Validate manifests with kubectl dry-run
        run: kubectl apply --dry-run=client --validate=false -f /tmp/gitops-rendered.yaml
