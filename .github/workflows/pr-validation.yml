name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

# Phase 22.2:
# Ce workflow ajoute un check leger et independant du build applicatif.
# Il complete CI + Security sur les PR vers main pour servir de required check
# dans les branch rules / rulesets GitHub avant auto-merge.
#
# Phase 22.4:
# Ce workflow reste dedie aux PR contributeurs. Les PR GitOps de la GitHub App
# ont leur propre validation legere dans gitops-validation.yml.

jobs:
  yaml-manifests:
    name: YAML & manifests
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.type != 'Bot' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
      !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow helper scripts
        run: |
          if compgen -G ".github/scripts/*.sh" > /dev/null; then
            bash -n .github/scripts/*.sh
          fi
          python3 -m py_compile .github/scripts/*.py

      - name: Validate GitHub Actions, manifests and infrastructure YAML
        run: |
          yamllint -c .github/yamllint.yml \
            .github/workflows \
            k8s \
            infra \
            docker-compose.yml
