name: Security

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    # Weekly on Monday at 03:00 UTC
    - cron: "0 3 * * 1"

# Phase 22.1:
# Sur main, ce workflow devient une validation bloquante au meme titre que CI.
# Le CD attend sa conclusion "success" avant toute livraison.
#
# Phase 22.2:
# Sur les PR vers main, ce workflow reste un required check avant merge ou
# auto-merge, aux cotes de CI et du workflow PR Validation.
#
# Phase 22.4:
# Les PR GitOps creees par la GitHub App ne doivent pas relancer les scans
# lourds CodeQL / OWASP / Trivy. On les detecte par leur forme (bot + branche + titre).
#
# Phase 22.5:
# Pour les PR contributeurs, ce workflow reste un required check du ruleset
# GitHub. L'auto-merge ne doit jamais permettre de le contourner.

jobs:
  # ── CodeQL — SAST ────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
      !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Setup Java 17 (Java analysis only)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile backend (Java analysis only)
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: mvn --batch-mode compile -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

  # ── OWASP Dependency-Check — Maven ───────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency-Check — backend
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
      !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          EXTRA=""
          if [ -n "$NVD_API_KEY" ]; then
            EXTRA="-DnvdApiKey=$NVD_API_KEY"
          fi
          mvn --batch-mode \
            org.owasp:dependency-check-maven:12.2.1:check \
            -DfailBuildOnCVSS=9 \
            -Dformat=HTML \
            -DnvdApiDelay=6000 \
            $EXTRA

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  # ── Trivy — Docker image scans ───────────────────────────────────────────────
  trivy-backend:
    name: Trivy — backend Docker image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
      !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build backend Docker image
        run: docker build -t stockpro-backend:scan ./backend

      - name: Scan backend image
        id: trivy-backend-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: stockpro-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload backend scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.2
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Fail backend job on vulnerabilities
        if: steps.trivy-backend-scan.outcome == 'failure'
        run: exit 1

  trivy-frontend:
    name: Trivy — frontend Docker image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.type != 'Bot' ||
      !startsWith(github.event.pull_request.head.ref, 'gitops/bump-images-') ||
      !startsWith(github.event.pull_request.title, 'chore(gitops): bump images to sha-')
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build frontend Docker image
        run: docker build -t stockpro-frontend:scan ./frontend

      - name: Scan frontend image
        id: trivy-frontend-scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: stockpro-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload frontend scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.2
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Fail frontend job on vulnerabilities
        if: steps.trivy-frontend-scan.outcome == 'failure'
        run: exit 1
