spring.application.name=stock-backend
spring.profiles.default=dev

server.port=8085

# JWT
jwt.secret=${JWT_SECRET:c3RvY2twcm8tc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktbWluaW11bS0zMi1jaGFycw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Auth cookie
stockpro.auth.cookie.name=${AUTH_COOKIE_NAME:STOCKPRO_AUTH}
stockpro.auth.cookie.path=${AUTH_COOKIE_PATH:/api}
stockpro.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
stockpro.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.jpa.open-in-view=false

logging.level.root=INFO
logging.level.com.wassim.stock=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.validator=WARN
logging.level.org.springframework.data.repository.config=WARN
logging.level.org.springframework.data.jpa.repository.query=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.hibernate.SQL=WARN

# Observabilité — Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics,caches
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=stockpro

# Seed users for local/demo testing. They are inserted in the active database only if missing.
stockpro.demo-data=${STOCKPRO_DEMO_DATA:true}
stockpro.seed.admin.nom=${SEED_ADMIN_NOM:Wassim Haoues}
stockpro.seed.admin.email=${SEED_ADMIN_EMAIL:admin@stockpro.local}
stockpro.seed.admin.password=${SEED_ADMIN_PASSWORD:Admin123!}
stockpro.seed.gestionnaire.nom=${SEED_GESTIONNAIRE_NOM:Youssef Trabelsi}
stockpro.seed.gestionnaire.email=${SEED_GESTIONNAIRE_EMAIL:gestionnaire@stockpro.local}
stockpro.seed.gestionnaire.password=${SEED_GESTIONNAIRE_PASSWORD:Gestion123!}
stockpro.seed.observateur.nom=${SEED_OBSERVATEUR_NOM:Ines Mansouri}
stockpro.seed.observateur.email=${SEED_OBSERVATEUR_EMAIL:observateur@stockpro.local}
stockpro.seed.observateur.password=${SEED_OBSERVATEUR_PASSWORD:Observe123!}
