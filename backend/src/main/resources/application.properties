spring.application.name=stock-backend
spring.profiles.default=dev
spring.config.import=optional:file:../infra/.env[.properties],optional:file:./infra/.env[.properties],optional:file:./.env[.properties]

server.port=${BACKEND_PORT}

# JWT
stockpro.jwt.secret=${JWT_SECRET}
stockpro.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# HttpOnly JWT cookie
stockpro.auth.cookie.name=${AUTH_COOKIE_NAME}
stockpro.auth.cookie.path=${AUTH_COOKIE_PATH}
stockpro.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE}
stockpro.auth.cookie.secure=${AUTH_COOKIE_SECURE}
stockpro.auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS}

# CORS
stockpro.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Seed users for local/demo testing. They are inserted in the active database only if missing.
stockpro.seed.admin.nom=${SEED_ADMIN_NOM}
stockpro.seed.admin.email=${SEED_ADMIN_EMAIL}
stockpro.seed.admin.password=${SEED_ADMIN_PASSWORD}
stockpro.seed.gestionnaire.nom=${SEED_GESTIONNAIRE_NOM}
stockpro.seed.gestionnaire.email=${SEED_GESTIONNAIRE_EMAIL}
stockpro.seed.gestionnaire.password=${SEED_GESTIONNAIRE_PASSWORD}
stockpro.seed.observateur.nom=${SEED_OBSERVATEUR_NOM}
stockpro.seed.observateur.email=${SEED_OBSERVATEUR_EMAIL}
stockpro.seed.observateur.password=${SEED_OBSERVATEUR_PASSWORD}
