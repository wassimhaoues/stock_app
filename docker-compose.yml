services:

  # ── Base de données ─────────────────────────────────────────────────────────
  stock-db:
    image: mysql:8.0
    container_name: stock-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - stock_db_data:/var/lib/mysql
      - ./infra/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  stock-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: stock-db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STOCKPRO_DEMO_DATA: ${STOCKPRO_DEMO_DATA:-true}
    depends_on:
      stock-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend Angular (nginx) ─────────────────────────────────────────────────
  stock-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:80"
    depends_on:
      stock-backend:
        condition: service_healthy

volumes:
  stock_db_data:
