# PersistentVolumeClaim pour stocker les données Grafana (dashboards custom, alertes, sessions).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: stockpro
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: stockpro-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
