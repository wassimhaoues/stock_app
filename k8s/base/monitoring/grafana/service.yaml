# Service Grafana — ClusterIP.
# Pour accéder depuis l'extérieur : kubectl port-forward svc/stockpro-grafana 3000:3000 -n stockpro
apiVersion: v1
kind: Service
metadata:
  name: stockpro-grafana
  namespace: stockpro
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: stockpro-monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
