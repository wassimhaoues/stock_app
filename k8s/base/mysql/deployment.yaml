# Deployment MySQL 8.0.
# Les credentials viennent du Secret "stockpro-secrets", généré depuis le .env racine
# par le secretGenerator de l'overlay local.
# Les données persistent via le PVC mysql-pvc monté sur /var/lib/mysql.
# Le schéma SQL est monté depuis le ConfigMap mysql-init-sql (généré par Kustomize
# depuis infra/mysql-init/01-schema.sql) et exécuté automatiquement au premier démarrage.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: stockpro
  labels:
    app: stockpro
    component: mysql
spec:
  replicas: 1
  # Recreate : nécessaire avec ReadWriteOnce — deux pods ne peuvent pas monter
  # le même PVC en écriture simultanément.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stockpro
      component: mysql
  template:
    metadata:
      labels:
        app: stockpro
        component: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--default-authentication-plugin=mysql_native_password"]
          ports:
            - name: mysql
              containerPort: 3306
          # Les clés du .env correspondent exactement aux variables attendues par MySQL.
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stockpro-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: stockpro-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: stockpro-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stockpro-secrets
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init-sql
