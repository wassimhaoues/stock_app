# Overlay GitOps utilise par ArgoCD comme source de verite.
#
# Differences par rapport a l'overlay local :
# - pas de secretGenerator : le fichier .env est gitignore et ArgoCD ne peut pas le lire
# - le Secret "stockpro-secrets" doit etre cree manuellement une fois avant la premiere sync
# - les tags GHCR sont mis a jour automatiquement par .github/workflows/cd.yml via une PR GitOps
#
# Commande de bootstrap du secret :
# kubectl create secret generic stockpro-secrets \
#   --from-env-file=.env -n stockpro
#
# Flux de mise a jour automatique :
# merge sur main
# -> CI + Security vertes
# -> cd.yml construit et pousse les images sur GHCR
# -> cd.yml ouvre une PR GitOps avec la mise a jour des newTag
# -> la PR GitOps est mergee dans main apres validations GitHub
# -> ArgoCD detecte le changement Git et synchronise le cluster
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: stockpro

resources:
  - ../../base
  - ../../base/monitoring

images:
  - name: stockpro-backend
    newName: ghcr.io/wassimhaoues/stockpro-backend
    newTag: sha-7d3d6df
  - name: stockpro-frontend
    newName: ghcr.io/wassimhaoues/stockpro-frontend
    newTag: sha-3b89bb1

patches:
  - path: patches/expose-services.yaml
